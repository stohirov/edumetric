databaseChangeLog:
  - changeSet:
      id: v4-001-create-audit-log
      author: stohirov
      changes:
        - createTable:
            tableName: audit_log
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: entity_type
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: action
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: actor_user_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_audit_actor
                    references: users(id)
              - column:
                  name: payload
                  type: JSONB
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: audit_log
            indexName: idx_audit_entity
            columns:
              - column:
                  name: entity_type
              - column:
                  name: entity_id
        - createIndex:
            tableName: audit_log
            indexName: idx_audit_actor
            columns:
              - column:
                  name: actor_user_id
