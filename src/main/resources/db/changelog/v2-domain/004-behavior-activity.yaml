                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_activity_teacher
                    references: teachers(id)
              - column:
                  name: period_start
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: period_end
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: comment
