databaseChangeLog:
  - changeSet:
      id: v2-004-create-behavior-records
      author: stohirov
      changes:
        - createTable:
            tableName: behavior_records
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_behavior_student
                    references: students(id)
              - column:
                  name: teacher_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_behavior_teacher
                    references: teachers(id)
              - column:
                  name: period_start
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: period_end
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: SMALLINT
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: behavior_records
            columnNames: student_id, teacher_id, period_start, period_end
            constraintName: uk_behavior_window
        - sql:
            sql: ALTER TABLE behavior_records ADD CONSTRAINT ck_behavior_value CHECK (value BETWEEN 1 AND 5)
        - createIndex:
            tableName: behavior_records
            indexName: idx_behavior_student
            columns:
              - column:
                  name: student_id
