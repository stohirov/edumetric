spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  liquibase:
    contexts: default
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

app:
  cache:
    redis:
      # Use the Redis-backed cache manager for analytics dashboards in prod.
      enabled: ${CACHE_REDIS_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.edumetric.backend: INFO
