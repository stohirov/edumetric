databaseChangeLog:
  - changeSet:
      id: v1-011-refresh-tokens-session-metadata
      author: stohirov
      changes:
        - addColumn:
            tableName: refresh_tokens
            columns:
              - column:
                  name: user_agent
                  type: VARCHAR(512)
                  constraints:
                    nullable: true
              - column:
                  name: ip_address
                  type: VARCHAR(45)
                  constraints:
                    nullable: true
              - column:
                  name: last_used_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
