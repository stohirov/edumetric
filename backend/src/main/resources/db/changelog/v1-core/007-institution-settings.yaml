databaseChangeLog:
  - changeSet:
      id: v1-007-create-institution-settings
      author: stohirov
      changes:
        - createTable:
            tableName: institution_settings
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: institution_name
                  type: VARCHAR(255)
                  defaultValue: EduMetric
                  constraints:
                    nullable: false
              - column:
                  name: default_locale
                  type: VARCHAR(8)
                  defaultValue: en
                  constraints:
                    nullable: false
              - column:
                  name: primary_color
                  type: VARCHAR(16)
                  constraints:
                    nullable: true
              - column:
                  name: logo_url
                  type: VARCHAR(512)
                  constraints:
                    nullable: true
              - column:
                  name: grading_scale
                  type: VARCHAR(16)
                  defaultValue: PERCENT
                  constraints:
                    nullable: false
              - column:
                  name: at_risk_threshold
                  type: DOUBLE PRECISION
                  defaultValueNumeric: 60
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
