databaseChangeLog:
  - changeSet:
      id: v1-003-create-students
      author: stohirov
      changes:
        - createTable:
            tableName: students
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_students_user_id
                    foreignKeyName: fk_students_user
                    references: users(id)
              - column:
                  name: group_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: enrolled_at
                  type: DATE
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
        - sql:
            sql: CREATE INDEX idx_students_group_id_active ON students(group_id) WHERE deleted_at IS NULL
