databaseChangeLog:
  - changeSet:
      id: v1-014-add-email-verified-column
      author: stohirov
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: email_verified
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

  - changeSet:
      id: v1-014-backfill-email-verified
      author: stohirov
      comment: Existing accounts predate verification; treat them as already verified so they are not retroactively nagged.
      changes:
        - update:
            tableName: users
            columns:
              - column:
                  name: email_verified
                  valueBoolean: true

  - changeSet:
      id: v1-014-create-email-verification-tokens
      author: stohirov
      changes:
        - createTable:
            tableName: email_verification_tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_email_verification_tokens_user
                    references: users(id)
              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_email_verification_tokens_hash
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
