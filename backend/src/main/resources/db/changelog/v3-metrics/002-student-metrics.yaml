databaseChangeLog:
  - changeSet:
      id: v3-002-create-student-metrics
      author: stohirov
      changes:
        - createTable:
            tableName: student_metrics
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_student_metrics_student
                    foreignKeyName: fk_student_metrics_student
                    references: students(id)
              - column:
                  name: composite_score
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: true
              - column:
                  name: grades_norm
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: true
              - column:
                  name: attendance_norm
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: true
              - column:
                  name: practical_norm
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: true
              - column:
                  name: behavior_norm
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: true
              - column:
                  name: activity_norm
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: true
              - column:
                  name: growth_bonus
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: true
              - column:
                  name: consistency_bonus
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: true
              - column:
                  name: formula_version
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: sample_size
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: computed_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: student_metrics
            indexName: idx_student_metrics_composite
            columns:
              - column:
                  name: composite_score
