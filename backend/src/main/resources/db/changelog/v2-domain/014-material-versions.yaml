databaseChangeLog:
  - changeSet:
      id: v2-014-create-material-versions
      author: stohirov
      changes:
        - createTable:
            tableName: material_versions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: material_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_material_versions_material
                    references: course_materials(id)
              - column:
                  name: version_no
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: type
                  type: VARCHAR(32)
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: url
                  type: VARCHAR(2048)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: created_by_user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_material_versions_created_by
                    references: users(id)
        - createIndex:
            tableName: material_versions
            indexName: idx_material_versions_material
            columns:
              - column:
                  name: material_id
