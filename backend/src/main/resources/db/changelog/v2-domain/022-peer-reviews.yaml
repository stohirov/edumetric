databaseChangeLog:
  - changeSet:
      id: v2-022-create-peer-reviews
      author: stohirov
      changes:
        - createTable:
            tableName: peer_reviews
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: assignment_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_peer_reviews_assignment
                    references: assignments(id)
              - column:
                  name: reviewer_student_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_peer_reviews_reviewer
                    references: students(id)
              - column:
                  name: reviewee_student_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_peer_reviews_reviewee
                    references: students(id)
              - column:
                  name: status
                  type: VARCHAR(16)
                  defaultValue: ASSIGNED
                  constraints:
                    nullable: false
              - column:
                  name: score
                  type: NUMERIC(10, 2)
              - column:
                  name: comments
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: submitted_at
                  type: TIMESTAMP WITH TIME ZONE
        - sql:
            sql: ALTER TABLE peer_reviews ADD CONSTRAINT ck_peer_reviews_status CHECK (status IN ('ASSIGNED','SUBMITTED'))
        - addUniqueConstraint:
            tableName: peer_reviews
            columnNames: assignment_id, reviewer_student_id, reviewee_student_id
            constraintName: uk_peer_reviews_unique
