databaseChangeLog:
  - changeSet:
      id: v2-012-create-syllabus
      author: stohirov
      changes:
        - createTable:
            tableName: course_syllabus
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_syllabus_course
                    foreignKeyName: fk_syllabus_course
                    references: courses(id)
              - column:
                  name: objectives
                  type: TEXT
              - column:
                  name: outline
                  type: TEXT
              - column:
                  name: published
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
