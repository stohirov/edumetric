databaseChangeLog:
  - changeSet:
      id: v2-009-create-enrollments
      author: stohirov
      changes:
        - createTable:
            tableName: enrollments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_enrollments_student
                    references: students(id)
              - column:
                  name: group_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_enrollments_group
                    references: groups(id)
              - column:
                  name: status
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: enrolled_at
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: ended_at
                  type: DATE
              - column:
                  name: reason
                  type: TEXT
              - column:
                  name: created_by_user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_enrollments_created_by
                    references: users(id)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE enrollments ADD CONSTRAINT ck_enrollments_status CHECK (status IN ('ACTIVE','WITHDRAWN','TRANSFERRED','COMPLETED'))
        - createIndex:
            tableName: enrollments
            indexName: idx_enrollments_student
            columns:
              - column:
                  name: student_id
