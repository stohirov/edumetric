databaseChangeLog:
  - changeSet:
      id: v2-018-create-submission-feedback
      author: stohirov
      changes:
        - createTable:
            tableName: submission_feedback
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: assignment_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_submission_feedback_assignment
                    references: assignments(id)
              - column:
                  name: student_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_submission_feedback_student
                    references: students(id)
              - column:
                  name: author_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_submission_feedback_author
                    references: users(id)
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: submission_feedback
            indexName: idx_submission_feedback_assignment_student
            columns:
              - column:
                  name: assignment_id
              - column:
                  name: student_id
