databaseChangeLog:
  - changeSet:
      id: v2-021-create-plagiarism-reports
      author: stohirov
      changes:
        - createTable:
            tableName: plagiarism_reports
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: assignment_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_plagiarism_reports_assignment
                    references: assignments(id)
              - column:
                  name: student_a_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_plagiarism_reports_student_a
                    references: students(id)
              - column:
                  name: student_b_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_plagiarism_reports_student_b
                    references: students(id)
              - column:
                  name: similarity
                  type: NUMERIC(5, 2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: plagiarism_reports
            indexName: idx_plagiarism_reports_assignment
            columns:
              - column:
                  name: assignment_id
