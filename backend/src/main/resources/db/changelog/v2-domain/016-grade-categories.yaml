databaseChangeLog:
  - changeSet:
      id: v2-016-create-grade-categories
      author: stohirov
      changes:
        - createTable:
            tableName: grade_categories
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_grade_categories_course
                    references: courses(id)
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: weight
                  type: NUMERIC(6, 3)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
  - changeSet:
      id: v2-016-assignments-category
      author: stohirov
      changes:
        - addColumn:
            tableName: assignments
            columns:
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_assignments_category
                    references: grade_categories(id)
