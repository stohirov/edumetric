databaseChangeLog:
  - changeSet:
      id: v2-028-create-conversations
      author: stohirov
      changes:
        - createTable:
            tableName: conversations
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_a_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_b_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: last_message_at
                  type: TIMESTAMP WITH TIME ZONE
  - changeSet:
      id: v2-028-fk-conversations-user-a
      author: stohirov
      changes:
        - addForeignKeyConstraint:
            constraintName: fk_conversations_user_a
            baseTableName: conversations
            baseColumnNames: user_a_id
            referencedTableName: users
            referencedColumnNames: id
  - changeSet:
      id: v2-028-fk-conversations-user-b
      author: stohirov
      changes:
        - addForeignKeyConstraint:
            constraintName: fk_conversations_user_b
            baseTableName: conversations
            baseColumnNames: user_b_id
            referencedTableName: users
            referencedColumnNames: id
  - changeSet:
      id: v2-028-uk-conversations-pair
      author: stohirov
      changes:
        - addUniqueConstraint:
            tableName: conversations
            columnNames: user_a_id, user_b_id
            constraintName: uk_conversations_pair
  - changeSet:
      id: v2-028-create-messages
      author: stohirov
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: conversation_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: sender_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: read_at
                  type: TIMESTAMP WITH TIME ZONE
  - changeSet:
      id: v2-028-fk-messages-conversation
      author: stohirov
      changes:
        - addForeignKeyConstraint:
            constraintName: fk_messages_conversation
            baseTableName: messages
            baseColumnNames: conversation_id
            referencedTableName: conversations
            referencedColumnNames: id
  - changeSet:
      id: v2-028-fk-messages-sender
      author: stohirov
      changes:
        - addForeignKeyConstraint:
            constraintName: fk_messages_sender
            baseTableName: messages
            baseColumnNames: sender_id
            referencedTableName: users
            referencedColumnNames: id
