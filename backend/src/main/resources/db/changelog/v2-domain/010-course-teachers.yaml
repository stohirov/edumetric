databaseChangeLog:
  - changeSet:
      id: v2-010-create-course-teachers
      author: stohirov
      changes:
        - createTable:
            tableName: course_teachers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_course_teachers_course
                    references: courses(id)
              - column:
                  name: teacher_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_course_teachers_teacher
                    references: teachers(id)
              - column:
                  name: assignment_role
                  type: VARCHAR(16)
                  defaultValue: CO_TEACHER
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: course_teachers
            columnNames: course_id, teacher_id
            constraintName: uk_course_teachers_course_teacher
        - sql:
            sql: ALTER TABLE course_teachers ADD CONSTRAINT ck_course_teachers_role CHECK (assignment_role IN ('LEAD','CO_TEACHER'))
