spring:
  application:
    name: edumetric-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  data:
    web:
      pageable:
        # Cap client-supplied page sizes so no endpoint can be asked for an unbounded result set.
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    contexts: ${LIQUIBASE_CONTEXTS:default}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

app:
  cache:
    redis:
      # In-process cache by default (dev/test). The prod overlay flips this to true for Redis.
      enabled: ${CACHE_REDIS_ENABLED:false}
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-development-only-secret-min-32-bytes}
    # Short-lived access token; the client silently refreshes via /api/auth/refresh.
    expiration-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-expiration-days: ${JWT_REFRESH_DAYS:30}
    issuer: edumetric
  cors:
    allowed-origins: ${CORS_ORIGIN:http://localhost:3000}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:edumetric-homework}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
